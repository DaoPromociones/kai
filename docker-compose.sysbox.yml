services:
  openclaw-gateway:
    # --------------------------------------------------------------------------
    # Sysbox Runtime Extension - Versión Corregida (Paths & Syntax)
    # --------------------------------------------------------------------------
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.sysbox
    image: openclaw-sysbox:local
    runtime: sysbox-runc
    # Sysbox requiere privileged: true para gestionar las capas de aislamiento
    privileged: true 
    volumes:
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /var/lib/sysbox:/var/lib/sysbox:rw
     
    tmpfs:
      - /run
      - /tmp
    
    entrypoint:
      - /bin/sh
      - -c
      - |
        # 1.  permisos
        
        sudo chown -R node:node /home/node/.openclaw
        
        # 2. Iniciar dockerd
        sudo rm -f /var/run/docker.sock /var/run/docker.pid
        sudo dockerd --iptables=false --bridge=none > /tmp/dockerd.log 2>&1 &
        
        # 3. Bucle de espera corregido (Doble $$ para que Compose no se líe)
        timeout=15
        while [ $$timeout -gt 0 ]; do
          if [ -S /var/run/docker.sock ]; then break; fi
          echo "Esperando a dockerd... ($$timeout)"
          sleep 1
          timeout=$((timeout-1))
        done
        
        sudo chmod 666 /var/run/docker.sock
        
        # 4. Lanzar el Gateway
        echo "✅ OpenClaw Gateway arrancando..."
        exec node dist/index.js gateway --allow-unconfigured